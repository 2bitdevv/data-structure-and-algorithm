<!DOCTYPE html>
<html>
<body>
<input type="text" id="inp" value="A+(B-C^D)*E/F**">
<script>
function prec(op) {
  if (op==='+' || op==='-') return 1;
  if (op==='*' || op==='/') return 2;
  if (op==='**') return 3;
  if (op==='^') return 4;
  return 0;
}

function toPostfix(exp) {
  let stack=[], res=[], i=0;
  while (i < exp.length) {
    let op = exp[i];
    if (exp[i]==='*' && exp[i+1]==='*') { op='**'; i++; }
    if (/[A-Za-z0-9]/.test(op)) res.push(op);
    else if (op==='(') stack.push(op);
    else if (op===')') { while (stack.at(-1)!=='(') res.push(stack.pop()); stack.pop(); }
    else if (prec(op)>0) {
      if (op==='**'||op==='^') while (stack.length && prec(stack.at(-1)) > prec(op)) res.push(stack.pop());
      else while (stack.length && prec(stack.at(-1)) >= prec(op)) res.push(stack.pop());
      stack.push(op);
    }
    i++;
  }
  while (stack.length) res.push(stack.pop());
  return res.join(' ');
}

function toPrefix(exp) {
  let tokens=[], i=exp.length-1;
  while (i >= 0) {
    if (exp[i]==='*' && exp[i-1]==='*') { tokens.push('**'); i-=2; }
    else { let c=exp[i]; tokens.push(c==='('?')':(c===')'?'(':c)); i--; }
  }
  let stack=[], res=[];
  for (let op of tokens) {
    if (/[A-Za-z0-9]/.test(op)) res.push(op);
    else if (op==='(') stack.push(op);
    else if (op===')') { while (stack.at(-1)!=='(') res.push(stack.pop()); stack.pop(); }
    else if (prec(op)>0) {
      if (op==='**'||op==='^') while (stack.length && prec(stack.at(-1)) >= prec(op)) res.push(stack.pop());
      else while (stack.length && prec(stack.at(-1)) > prec(op)) res.push(stack.pop());
      stack.push(op);
    }
  }
  while (stack.length) res.push(stack.pop());
  return res.reverse().join(' ');
}

function run() {
  const val = document.getElementById('inp').value.replace(/\s+/g,'');
  console.log('Infix:   ' + val);
  console.log('Postfix: ' + toPostfix(val));
  console.log('Prefix:  ' + toPrefix(val));
}

document.getElementById('inp').addEventListener('input', run);
run();
</script>
</body>
</html>

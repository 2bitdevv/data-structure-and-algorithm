<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infix to Postfix  PreFix Converter</title>
</head>
<body>

<script>
  // 1) Expression 
  let Expression = "A+(B-C^D)*E/F**";

  // 2)  operator
  // +,- = 1
  // *,/ = 2
  // **  = 3
  // ^   = 4
  function Precedence(operator){
    if(operator === '+' || operator === '-') return 1;
    else if(operator === '*' || operator === '/') return 2;
    else if(operator === '**') return 3;
    else if(operator === '^') return 4;
    else return 0;
  }

  // 3)  Infix to Postfix
  function infixToPostfix(exp){
    console.log("Expression:", exp);

    let Stack = [];     
    let Postfix = [];  
    let index = 0;

    while(index < exp.length){
      let char = exp.charAt(index);
      let op = char;

      // 3.1 ตรวจสอบ ** 
      if(char === '*' && exp.charAt(index + 1) === '*'){
        op = '**';
        index++;
      }

      // 3.2 ถ้าเป็น operand
      if(/^[A-Za-z0-9]$/.test(op)){
        Postfix.push(op);
      }

      // 3.3 ถ้าเป็น (
      else if(op === '('){
        Stack.push(op);
      }

      // 3.4 ถ้าเป็น )
      else if(op === ')'){
        while(Stack.length && Stack[Stack.length - 1] !== '('){
          Postfix.push(Stack.pop());
        }
        if(Stack.length){
          Stack.pop(); // เอา ( ออก
        }
      }

      // 3.5 ถ้าเป็น operator
      else{
        // กรณี right-associative => ** และ ^
        if(op === '**' || op === '^'){
          while(
            Stack.length &&
            Precedence(Stack[Stack.length - 1]) > Precedence(op)
          ){
            Postfix.push(Stack.pop());
          }
        }

        // กรณี left-associative => + - * /
        else{
          while(
            Stack.length &&
            Precedence(Stack[Stack.length - 1]) >= Precedence(op)
          ){
            Postfix.push(Stack.pop());
          }
        }

        Stack.push(op);
      }

      index++;
    }

    // 3.6 เอา operator ที่เหลือใน stack ออกมาใส่ postfix
    while(Stack.length){
      Postfix.push(Stack.pop());
    }

    console.log("Postfix Array:", Postfix);
    console.log("Postfix String:", Postfix.join(" "));
    return Postfix;
  }

  // 4) Infix to Prefix
  function infixToPrefix(exp){
    console.log("Expression:", exp);

    // 4.1 Reverse string และสลับวงเล็บ
    let Reversed = [];
    let i = exp.length - 1;
    while(i >= 0){
      let char = exp.charAt(i);

      // ตรวจสอบ ** (อ่านจากขวา index i = *, i-1 = *)
      if(char === '*' && exp.charAt(i - 1) === '*'){
        Reversed.push('**');
        i -= 2;
        continue;
      }

      // สลับวงเล็บ
      if(char === '(') Reversed.push(')');
      else if(char === ')') Reversed.push('(');
      else Reversed.push(char);

      i--;
    }

    // 4.2 ทำ Postfix บน Reversed (แต่สลับกฎ associativity)
    let Stack = [];
    let Prefix = [];

    for(let token of Reversed){

      // ถ้าเป็น operand
      if(/^[A-Za-z0-9]$/.test(token)){
        Prefix.push(token);
      }

      // ถ้าเป็น (
      else if(token === '('){
        Stack.push(token);
      }

      // ถ้าเป็น )
      else if(token === ')'){
        while(Stack.length && Stack[Stack.length - 1] !== '('){
          Prefix.push(Stack.pop());
        }
        if(Stack.length){
          Stack.pop(); // เอา ( ออก
        }
      }

      // ถ้าเป็น operator
      else{
        // right-associative => ใช้ >= (สลับจาก postfix)
        if(token === '**' || token === '^'){
          while(
            Stack.length &&
            Precedence(Stack[Stack.length - 1]) >= Precedence(token)
          ){
            Prefix.push(Stack.pop());
          }
        }

        // left-associative => ใช้ > (สลับจาก postfix)
        else{
          while(
            Stack.length &&
            Precedence(Stack[Stack.length - 1]) > Precedence(token)
          ){
            Prefix.push(Stack.pop());
          }
        }

        Stack.push(token);
      }
    }

    // 4.3 เอา operator ที่เหลือใน stack ออกมา
    while(Stack.length){
      Prefix.push(Stack.pop());
    }

    // 4.4 Reverse ผลลัพธ์เพื่อให้ได้ Prefix
    Prefix.reverse();

    console.log("Prefix Array:", Prefix);
    console.log("Prefix String:", Prefix.join(" "));
    return Prefix;
  }

  // 5) เรียกใช้
  console.log("Output Postfix [] :", infixToPostfix(Expression));
  console.log("Output Prefix  [] :", infixToPrefix(Expression));
</script>

</body>
</html>

<script>
  let Expression = "A+(B*C)";
  function Precedence(operator){
    if(operator == '+' || operator == '-') return 1;
    else if(operator == '*' || operator == '/') return 2;
    else if(operator == '**') return 3;
    else return 0;
  }
  function PrecedenceCase(operator){
    switch(operator){
      case '**': return 3;
      case '*': case '/': return 2;
      case '+': case '-': return 1;
      default: return 0;
    }
  }

  function infixToPostfix(exp){
    console.log("Expression:",exp);
    let Stack = []; 
    let Postfix = [];
    // for(let index = 0 ; index < exp.length; index++){
    //   let char = exp.charAt(index);
    //   console.log("exp["+index+"]:",char);
    // }
    var index = 0;
    while(index < exp.length){
      let char = exp.charAt(index);
      // console.log("exp["+index+"]:",char);
      if(char.match(/[A-Za-z0-9]/)){
        // console.log("found Operand:",char);
        Postfix.push(char);
      }else if(char == '('){
        Stack.push(char);
      }else if(char == ')'){
        while(Stack.length && Stack[Stack.length-1] != '('){
          Postfix.push(Stack.pop());
        }
        Stack.pop();
      }else {
        while(Stack.length && Precedence(Stack[Stack.length-1]) >= Precedence(char)){
          Postfix.push(Stack.pop());
        }
        Stack.push(char);
      }
      index++;
    }
    while(Stack.length){
      Postfix.push(Stack.pop());
    }
    // var index = 0;
    // do{
    //   let char = exp.charAt(index);
    //   console.log("exp["+index+"]:",char);
    //   index++;
    // }while(index < exp.length);
    console.log("Stack:",Stack);
    console.log("Postfix",Postfix);
    return Postfix;
  }
  console.log("Output Postfix []:",infixToPostfix(Expression));
</script>
